name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  COOLIFY_API_URL: https://coolify-api.feedcode.dev
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout infra (scripts)
        uses: actions/checkout@v4
        with:
          repository: gibtang/infra
          path: .infra

      - name: Notify start
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="🔨 <b>ghcr.io/gibtang/anban</b> #${{ github.run_number }} — build started"
          bash .infra/scripts/telegram-notify.sh "$msg" || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build

        run: |
          set -euo pipefail
          docker build \
            -f "Dockerfile" \
            -t "ghcr.io/gibtang/anban:latest" \
            -t "ghcr.io/gibtang/anban:github-${{ github.run_number }}" \
            "."

      - name: Push
        run: |
          docker push "ghcr.io/gibtang/anban:latest"
          docker push "ghcr.io/gibtang/anban:github-${{ github.run_number }}"

      - name: Deploy via Coolify
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          bash .infra/scripts/coolify-deploy.sh "yxvqbs5rknprqqtc5bxzeok1"

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="✅ <b>ghcr.io/gibtang/anban</b> #${{ github.run_number }} — deploy SUCCESS: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .infra/scripts/telegram-notify.sh "$msg" || true

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="❌ <b>ghcr.io/gibtang/anban</b> #${{ github.run_number }} — build FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .infra/scripts/telegram-notify.sh "$msg" || true

      - name: Notify abort
        if: cancelled()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="⏹ <b>ghcr.io/gibtang/anban</b> #${{ github.run_number }} — build ABORTED"
          bash .infra/scripts/telegram-notify.sh "$msg" || true
