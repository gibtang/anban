name: Build, Push & Deploy

# Push to main -> build Docker image -> push to GHCR -> trigger Coolify deploy.
# The deploy only fires after a successful build+push, so a broken build
# never reaches production (true CI gating).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push image to ghcr.io

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tags.outputs.latest }}
      sha-tag: ${{ steps.tags.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: tags
        run: |
          repo_lc="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          sha="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "latest=ghcr.io/${repo_lc}:latest" >> "$GITHUB_OUTPUT"
          echo "sha=ghcr.io/${repo_lc}:${sha}" >> "$GITHUB_OUTPUT"
          echo "Building: ghcr.io/${repo_lc}:latest (+ :${sha})"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided, no secret needed

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.latest }}
            ${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy the freshly built image
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          set -e
          echo "Deploying $IMAGE via Coolify..."
          code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST \
            "${COOLIFY_URL}/api/v1/deploy" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\":\"${COOLIFY_APP_UUID}\"}")
          echo "Coolify responded HTTP ${code}:"
          cat /tmp/resp; echo
          if [ "$code" != "200" ]; then echo "::error::Coolify deploy failed (HTTP ${code})"; exit 1; fi
          echo "Deployment queued."
